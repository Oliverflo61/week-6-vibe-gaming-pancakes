<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic RingWeasel</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        .game-container {
            background: #34495e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        canvas {
            border: 3px solid #ecf0f1;
            background: #000;
            display: block;
            border-radius: 5px;
        }
        
        .controls {
            color: white;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        
        .controls h3 {
            margin: 0 0 10px 0;
            color: #ecf0f1;
        }
        
        .key {
            background: #3498db;
            color: white;
            padding: 4px 8px;
            border-radius: 3px;
            font-weight: bold;
            margin: 0 2px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="1000" height="1000"></canvas>
        <!-- background music (may be blocked until user interacts) -->
        <audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
        <div class="controls">
            <h3>Controls</h3>
            <p>Use <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> keys to move the weasel</p>
        </div>
    </div>

    <script>
        class WeaselGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                // Game settings
                this.gameWidth = this.canvas.width;
                this.gameHeight = this.canvas.height;
                
                // Player settings
                this.player = {
                    x: this.gameWidth / 2,
                    y: this.gameHeight / 2,
                    width: 64,
                    height: 64,
                    speed: 5,
                    image: null,
                    imageLoaded: false,
                    lives: 8,
                    shielded: false,
                    shieldTimer: 0
                };
                
                // Input handling
                this.keys = {
                    w: false,
                    a: false,
                    s: false,
                    d: false
                };
                
                // Game state
                this.gameState = 'playing'; // 'playing' or 'gameOver'
                this.gameStartTime = Date.now();
                this.gameEndTime = null;

                // Audio context for effects
                this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                this.bgMusic = null; // will be assigned in init
                
                // Rings
                this.rings = [];
                this.ringSpawnDelay = 3000; // 3 seconds
                this.lastRingSpawn = 0;
                this.ringsSpawned = 0;
                
                // Power-ups
                this.powerUps = [];
                this.powerUpSpawnChance = 0.01; // 1% chance when spawning rings
                
                // Game modifiers
                this.slowTimer = 0;
                this.slowMultiplier = 1;
                this.slowDuration = 8000; // 8 seconds when power-up collected
                
                // Blast particles
                this.particles = [];
                
                this.init();
            }
            
            init() {
                // Load player sprite
                this.player.image = new Image();
                this.player.image.onload = () => {
                    this.player.imageLoaded = true;
                };
                this.player.image.onerror = () => {
                    console.log('Could not load weasel.png, using placeholder');
                    this.player.imageLoaded = false;
                };
                this.player.image.src = 'weasel.png';

                // background music element
                this.bgMusic = document.getElementById('bgMusic');
                if (this.bgMusic) {
                    this.bgMusic.volume = 0.2;
                    // attempt to play (may require user interaction)
                    this.bgMusic.play().catch(e => console.log('bgMusic play prevented', e));
                }
                
                // Set up event listeners
                this.setupInputHandlers();
                
                // Start game loop
                this.gameLoop();
            }
            
            setupInputHandlers() {
                document.addEventListener('keydown', (e) => {
                    // resume audio context on first input (browsers often suspend it)
                    if (this.audioCtx && this.audioCtx.state === 'suspended') {
                        this.audioCtx.resume();
                    }
                    switch(e.key.toLowerCase()) {
                        case 'w':
                            this.keys.w = true;
                            break;
                        case 'a':
                            this.keys.a = true;
                            break;
                        case 's':
                            this.keys.s = true;
                            break;
                        case 'd':
                            this.keys.d = true;
                            break;
                    }
                    e.preventDefault();
                });
                
                document.addEventListener('keyup', (e) => {
                    switch(e.key.toLowerCase()) {
                        case 'w':
                            this.keys.w = false;
                            break;
                        case 'a':
                            this.keys.a = false;
                            break;
                        case 's':
                            this.keys.s = false;
                            break;
                        case 'd':
                            this.keys.d = false;
                            break;
                    }
                    e.preventDefault();
                });
            }
            
            update() {
                if (this.gameState === 'gameOver') return;
                
                // Update shield timer
                if (this.player.shielded) {
                    this.player.shieldTimer--;
                    if (this.player.shieldTimer <= 0) {
                        this.player.shielded = false;
                    }
                }
                
                // Update slow effect
                if (this.slowTimer > 0) {
                    this.slowTimer--;
                    this.slowMultiplier = 0.5; // Slow to half speed
                } else {
                    this.slowMultiplier = 1;
                }
                
                // Spawn rings every 3 seconds
                const currentTime = Date.now();
                if (this.ringsSpawned < 3 && currentTime - this.gameStartTime > this.ringSpawnDelay * (this.ringsSpawned + 1)) {
                    this.spawnRing();
                    this.ringsSpawned++;
                    
                    // Chance to spawn power-up
                    if (Math.random() < this.powerUpSpawnChance) {
                        this.spawnPowerUp();
                    }
                }
                
                // Handle movement
                if (this.keys.w) {
                    this.player.y -= this.player.speed;
                }
                if (this.keys.s) {
                    this.player.y += this.player.speed;
                }
                if (this.keys.a) {
                    this.player.x -= this.player.speed;
                }
                if (this.keys.d) {
                    this.player.x += this.player.speed;
                }
                
                // Keep player within boundaries
                this.player.x = Math.max(0, Math.min(this.gameWidth - this.player.width, this.player.x));
                this.player.y = Math.max(0, Math.min(this.gameHeight - this.player.height, this.player.y));
                
                // Update rings
                this.updateRings();
                
                // Update power-ups
                this.updatePowerUps();
                
                // Update particles
                this.updateParticles();
                
                // Check collisions
                this.checkCollisions();
                
                // Check power-up collisions
                this.checkPowerUpCollisions();
            }
            
            draw() {
                // Clear canvas
                this.ctx.clearRect(0, 0, this.gameWidth, this.gameHeight);
                
                // Draw black background
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.gameWidth, this.gameHeight);
                
                // Draw rings
                this.drawRings();
                
                // Draw power-ups
                this.drawPowerUps();
                
                // Draw particles
                this.drawParticles();
                
                // Draw player
                this.drawPlayer();
                
                // Draw UI
                this.drawUI();
                
                // Draw game over screen if needed
                if (this.gameState === 'gameOver') {
                    this.drawGameOver();
                }
            }
            
            spawnRing() {
                // Vary the size of rings - small, medium, large
                const sizeVariations = [
                    { radius: 20, speedMultiplier: 1.2 },
                    { radius: 30, speedMultiplier: 1.0 },
                    { radius: 40, speedMultiplier: 0.8 }
                ];
                
                const sizeChoice = sizeVariations[Math.floor(Math.random() * sizeVariations.length)];
                
                const ring = {
                    x: Math.random() * (this.gameWidth - sizeChoice.radius * 2),
                    y: Math.random() * (this.gameHeight - sizeChoice.radius * 2),
                    radius: sizeChoice.radius,
                    speed: (8 + (this.ringsSpawned * 2)) * sizeChoice.speedMultiplier,
                    dx: (Math.random() - 0.5) * 2,
                    dy: (Math.random() - 0.5) * 2
                };
                
                // Normalize direction vector
                const length = Math.sqrt(ring.dx * ring.dx + ring.dy * ring.dy);
                ring.dx = (ring.dx / length) * ring.speed * this.slowMultiplier;
                ring.dy = (ring.dy / length) * ring.speed * this.slowMultiplier;
                
                this.rings.push(ring);
            }
            
            updateRings() {
                // Check ring-to-ring collisions first
                for (let i = 0; i < this.rings.length; i++) {
                    for (let j = i + 1; j < this.rings.length; j++) {
                        this.checkRingCollision(this.rings[i], this.rings[j]);
                    }
                }
                
                // Update ring positions
                for (let ring of this.rings) {
                    // Apply slow multiplier to current velocity
                    ring.dx *= this.slowMultiplier;
                    ring.dy *= this.slowMultiplier;
                    
                    // Move ring
                    ring.x += ring.dx;
                    ring.y += ring.dy;
                    
                    // Bounce off walls
                    if (ring.x - ring.radius <= 0 || ring.x + ring.radius >= this.gameWidth) {
                        ring.dx = -ring.dx;
                        ring.x = Math.max(ring.radius, Math.min(this.gameWidth - ring.radius, ring.x));
                    }
                    if (ring.y - ring.radius <= 0 || ring.y + ring.radius >= this.gameHeight) {
                        ring.dy = -ring.dy;
                        ring.y = Math.max(ring.radius, Math.min(this.gameHeight - ring.radius, ring.y));
                    }
                }
            }
            
            checkRingCollision(ring1, ring2) {
                const dx = ring2.x - ring1.x;
                const dy = ring2.y - ring1.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < ring1.radius + ring2.radius) {
                    // Calculate collision normal
                    const normalX = dx / distance;
                    const normalY = dy / distance;
                    
                    // Separate rings to prevent overlap
                    const overlap = ring1.radius + ring2.radius - distance;
                    const separationX = normalX * overlap * 0.5;
                    const separationY = normalY * overlap * 0.5;
                    
                    ring1.x -= separationX;
                    ring1.y -= separationY;
                    ring2.x += separationX;
                    ring2.y += separationY;
                    
                    // Calculate relative velocity
                    const relativeVelocityX = ring2.dx - ring1.dx;
                    const relativeVelocityY = ring2.dy - ring1.dy;
                    
                    // Calculate relative velocity along normal
                    const velocityAlongNormal = relativeVelocityX * normalX + relativeVelocityY * normalY;
                    
                    // Don't resolve if objects are separating
                    if (velocityAlongNormal > 0) return;
                    
                    // Calculate impulse scalar (assuming equal mass)
                    const impulse = -2 * velocityAlongNormal / 2;
                    
                    // Apply impulse to velocities
                    ring1.dx -= impulse * normalX;
                    ring1.dy -= impulse * normalY;
                    ring2.dx += impulse * normalX;
                    ring2.dy += impulse * normalY;
                }
            }
            
            checkCollisions() {
                const playerCenterX = this.player.x + this.player.width / 2;
                const playerCenterY = this.player.y + this.player.height / 2;
                const playerRadius = Math.min(this.player.width, this.player.height) / 2;
                
                for (let i = 0; i < this.rings.length; i++) {
                    const ring = this.rings[i];
                    const distance = Math.sqrt(
                        Math.pow(playerCenterX - ring.x, 2) + 
                        Math.pow(playerCenterY - ring.y, 2)
                    );
                    
                    if (distance < playerRadius + ring.radius) {
                        // Create blast effect at collision point
                        const ringColor = ring.radius === 20 ? '#00ff00' : ring.radius === 30 ? '#ff0000' : '#ff00ff';
                        this.createBlast(ring.x, ring.y, ring.radius, ringColor);
                        
                        if (this.player.shielded) {
                            // Shield absorbs the hit
                            this.player.shielded = false;
                        } else {
                            // Lose a life
                            this.playBeep(200, 0.1);
                            this.player.lives--;
                            // Activate shield for 3 seconds (180 frames)
                            this.player.shielded = true;
                            this.player.shieldTimer = 180;
                            
                            if (this.player.lives <= 0) {
                                this.gameState = 'gameOver';
                                this.gameEndTime = Date.now();
                                // play game over sound
                                this.playBeep(100, 0.4);
                                return;
                            }
                        }
                        // Remove the ring after contact
                        this.rings.splice(i, 1);
                        i--;
                    }
                }
            }
            
            spawnPowerUp() {
                const powerUp = {
                    x: Math.random() * (this.gameWidth - 40),
                    y: Math.random() * (this.gameHeight - 40),
                    width: 40,
                    height: 40,
                    type: 'slow'
                };
                this.powerUps.push(powerUp);
            }
            
            updatePowerUps() {
                // Power-ups are stationary, just need to remove from level
                // Nothing to update for now
            }
            
            checkPowerUpCollisions() {
                const playerCenterX = this.player.x + this.player.width / 2;
                const playerCenterY = this.player.y + this.player.height / 2;
                const playerRadius = Math.min(this.player.width, this.player.height) / 2;
                
                for (let i = 0; i < this.powerUps.length; i++) {
                    const powerUp = this.powerUps[i];
                    const powerUpCenterX = powerUp.x + powerUp.width / 2;
                    const powerUpCenterY = powerUp.y + powerUp.height / 2;
                    const powerUpRadius = powerUp.width / 2;
                    
                    const distance = Math.sqrt(
                        Math.pow(playerCenterX - powerUpCenterX, 2) + 
                        Math.pow(playerCenterY - powerUpCenterY, 2)
                    );
                    
                    if (distance < playerRadius + powerUpRadius) {
                        // Create gold blast at power-up collection
                        this.createBlast(powerUpCenterX, powerUpCenterY, 20, '#FFD700');
                        
                        if (powerUp.type === 'slow') {
                            // Activate slow effect for all circles
                            this.slowTimer = this.slowDuration / 16; // Divide by ~16 for frame timing
                            // play power-up sound
                            this.playBeep(600, 0.15);
                        }
                        // Remove collected power-up
                        this.powerUps.splice(i, 1);
                        i--;
                    }
                }
            }

            // simple beep using Web Audio API
            playBeep(frequency, duration = 0.1) {
                if (!this.audioCtx) return;
                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();
                osc.frequency.value = frequency;
                osc.connect(gain);
                gain.connect(this.audioCtx.destination);
                osc.start();
                osc.stop(this.audioCtx.currentTime + duration);
            }
            
            createBlast(x, y, size = 20, color = '#ff6600') {
                const particleCount = Math.ceil(size / 5);
                for (let i = 0; i < particleCount; i++) {
                    const angle = (Math.PI * 2 * i) / particleCount;
                    const speed = 3 + Math.random() * 4;
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 30,
                        maxLife: 30,
                        color: color,
                        size: Math.random() * 4 + 2
                    });
                }
            }
            
            updateParticles() {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.15; // gravity
                    p.life--;
                    
                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                    }
                }
            }
            
            drawParticles() {
                for (let p of this.particles) {
                    const alpha = p.life / p.maxLife;
                    this.ctx.fillStyle = this.hexToRgba(p.color, alpha);
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fill();
                }
            }
            
            hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
            
            drawRings() {
                for (let ring of this.rings) {
                    // Different colors for different sizes
                    if (ring.radius === 20) {
                        this.ctx.strokeStyle = '#00ff00'; // Green for small
                    } else if (ring.radius === 30) {
                        this.ctx.strokeStyle = '#ff0000'; // Red for medium
                    } else {
                        this.ctx.strokeStyle = '#ff00ff'; // Magenta for large
                    }
                    
                    this.ctx.lineWidth = 4;
                    this.ctx.beginPath();
                    this.ctx.arc(ring.x, ring.y, ring.radius, 0, Math.PI * 2);
                    this.ctx.stroke();
                }
            }
            
            drawPowerUps() {
                this.ctx.fillStyle = 'rgba(255, 215, 0, 0.8)'; // Gold color
                this.ctx.strokeStyle = '#FFD700';
                this.ctx.lineWidth = 2;
                
                for (let powerUp of this.powerUps) {
                    // Draw circular power-up with pulsing effect
                    const pulseSize = Math.sin(Date.now() / 300) * 3 + 20;
                    
                    this.ctx.beginPath();
                    this.ctx.arc(
                        powerUp.x + powerUp.width / 2,
                        powerUp.y + powerUp.height / 2,
                        pulseSize,
                        0,
                        Math.PI * 2
                    );
                    this.ctx.fill();
                    this.ctx.stroke();
                    
                    // Draw "S" for slow effect
                    this.ctx.fillStyle = '#000';
                    this.ctx.font = 'bold 16px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.fillText('S', powerUp.x + powerUp.width / 2, powerUp.y + powerUp.height / 2);
                }
            }
            
            drawBackground() {
                // Create a simple grass pattern
                this.ctx.fillStyle = '#2ecc71';
                this.ctx.fillRect(0, 0, this.gameWidth, this.gameHeight);
                
                // Add some texture with darker green dots
                this.ctx.fillStyle = '#27ae60';
                for (let x = 0; x < this.gameWidth; x += 20) {
                    for (let y = 0; y < this.gameHeight; y += 20) {
                        if (Math.random() > 0.7) {
                            this.ctx.fillRect(x, y, 2, 2);
                        }
                    }
                }
            }
            
            drawPlayer() {
                if (this.player.imageLoaded && this.player.image.complete) {
                    // Draw the weasel image
                    this.ctx.drawImage(
                        this.player.image,
                        this.player.x,
                        this.player.y,
                        this.player.width,
                        this.player.height
                    );
                } else {
                    // Draw placeholder if image not loaded
                    this.ctx.fillStyle = '#8B4513';
                    this.ctx.fillRect(this.player.x, this.player.y, this.player.width, this.player.height);
                    
                    // Add some basic weasel features
                    this.ctx.fillStyle = '#654321';
                    this.ctx.fillRect(this.player.x + 5, this.player.y + 5, 54, 54);
                    
                    // Eyes
                    this.ctx.fillStyle = '#000';
                    this.ctx.fillRect(this.player.x + 15, this.player.y + 15, 8, 8);
                    this.ctx.fillRect(this.player.x + 35, this.player.y + 15, 8, 8);
                    
                    // Eyepatch on left eye
                    this.ctx.fillStyle = '#000';
                    this.ctx.beginPath();
                    this.ctx.arc(this.player.x + 19, this.player.y + 19, 6, 0, Math.PI * 2);
                    this.ctx.fill();
                    // Eyepatch strap
                    this.ctx.strokeStyle = '#000';
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.moveTo(this.player.x + 13, this.player.y + 25);
                    this.ctx.lineTo(this.player.x + 25, this.player.y + 25);
                    this.ctx.stroke();
                    
                    // Nose
                    this.ctx.fillStyle = '#FF69B4';
                    this.ctx.fillRect(this.player.x + 28, this.player.y + 30, 6, 4);
                }
                
                // Draw shield if active
                if (this.player.shielded) {
                    const centerX = this.player.x + this.player.width / 2;
                    const centerY = this.player.y + this.player.height / 2;
                    const shieldRadius = 45;
                    
                    // Pulsing shield effect
                    const pulseIntensity = Math.sin(Date.now() / 200) * 0.3 + 0.7;
                    this.ctx.strokeStyle = `rgba(0, 255, 255, ${pulseIntensity})`;
                    this.ctx.lineWidth = 3;
                    this.ctx.beginPath();
                    this.ctx.arc(centerX, centerY, shieldRadius, 0, Math.PI * 2);
                    this.ctx.stroke();
                }
            }
            
            drawUI() {
                // Draw position indicator
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                this.ctx.fillRect(10, 10, 200, 120);
                
                this.ctx.fillStyle = '#fff';
                this.ctx.font = '14px Arial';
                this.ctx.textAlign = 'left';
                this.ctx.fillText(`Position: ${Math.round(this.player.x)}, ${Math.round(this.player.y)}`, 20, 30);
                this.ctx.fillText(`Speed: ${this.player.speed}`, 20, 50);
                this.ctx.fillText(`Rings: ${this.rings.length}/3`, 20, 70);
                
                // Draw lives
                this.ctx.fillText(`Lives: ${this.player.lives}`, 20, 90);
                
                // Draw shield status
                if (this.player.shielded) {
                    this.ctx.fillStyle = '#00ffff';
                    this.ctx.fillText('SHIELD ACTIVE', 20, 110);
                }
                
                // Draw slow effect status
                if (this.slowTimer > 0) {
                    this.ctx.fillStyle = '#ffff00';
                    this.ctx.fillText('SLOW MODE ACTIVE', 20, 130);
                }
                
                // Draw survival time
                const currentTime = this.gameState === 'gameOver' ? this.gameEndTime : Date.now();
                const survivalTime = Math.floor((currentTime - this.gameStartTime) / 1000);
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                this.ctx.fillRect(this.gameWidth - 120, 10, 110, 30);
                this.ctx.fillStyle = '#fff';
                this.ctx.textAlign = 'right';
                this.ctx.fillText(`Time: ${survivalTime}s`, this.gameWidth - 20, 30);
            }
            
            drawGameOver() {
                // Draw overlay
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                this.ctx.fillRect(0, 0, this.gameWidth, this.gameHeight);
                
                // Draw game over text
                this.ctx.fillStyle = '#ff0000';
                this.ctx.font = 'bold 48px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('GAME OVER', this.gameWidth / 2, this.gameHeight / 2 - 40);
                
                const survivalTime = Math.floor((this.gameEndTime - this.gameStartTime) / 1000);
                this.ctx.fillStyle = '#fff';
                this.ctx.font = '24px Arial';
                this.ctx.fillText(`You survived ${survivalTime} seconds!`, this.gameWidth / 2, this.gameHeight / 2 + 20);
                
                this.ctx.font = '18px Arial';
                this.ctx.fillText('Refresh to play again', this.gameWidth / 2, this.gameHeight / 2 + 60);
            }
            
            gameLoop() {
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }
        
        // Start the game when page loads
        window.addEventListener('load', () => {
            new WeaselGame();
        });
    </script>
</body>
</html>
